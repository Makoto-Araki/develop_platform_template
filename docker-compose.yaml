services:
  # MySQL データベースコンテナ
  db:
    image: mysql:8.0
    container_name: mysql-integration-test
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3306:3306"
    # 初期化スクリプトをマウント、起動後に自動実行される
    volumes:
      - ./test/integration/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10