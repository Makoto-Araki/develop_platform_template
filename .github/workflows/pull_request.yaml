# -----------------------------------------------------------------------
# Workflow名: Pull Request CI
# 目的:
# - Pull Request 時の品質ゲート
# - main ブランチを壊さないための事前チェック
# - 副作用（push / deploy）は一切行わない
# -----------------------------------------------------------------------
name: Pull Request CI

on:
  # main 向けの Pull Request が作成・更新された時のみ実行
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. ソースコードの取得
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Pythonインストール
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Ruffインストール
      - name: Install Ruff
        run: pip install ruff

      # 4. Ruffチェック
      - name: Run Ruff (Lint)
        run: ruff check .

      # 5. Ruff修正
      - name: Check formatting
        run: ruff format . --check

      # 6. DockerイメージをCI用にビルド
      - name: Build image for CI
        run: docker build -t develop_platform_template_image:ci -f .devcontainer/Dockerfile-dev .

      # 7. unitテストの実行(コンテナ内)
      - name: Run Unit Tests
        run: |
          docker run --rm \
            develop_platform_template_image:ci \
            python -m pytest test/unit -v

      # 8. integrationテストの実行(コンテナ内)
      - name: Run Integration Tests
        run: |
          docker run --rm \
            develop_platform_template_image:ci \
            python -m pytest test/integration -v