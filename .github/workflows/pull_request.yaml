# -----------------------------------------------------------------------
# Workflow名: Pull Request CI
# 目的:
# - Pull Request 時の品質ゲート
# - main ブランチを壊さないための事前チェック
# - 副作用（push / deploy）は一切行わない
# -----------------------------------------------------------------------
name: Pull Request CI

on:
  # main 向けの Pull Request が作成・更新された時のみ実行
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # MySQLサービスコンテナの定義
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        # MySQLが起動完了するまで待機する設定
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. ソースコードの取得
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Pythonインストール
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Ruffインストール
      - name: Install Ruff
        run: pip install ruff

      # 4. Ruffチェック
      - name: Run Ruff (Lint)
        run: ruff check .

      # 5. Ruff修正
      - name: Check formatting
        run: ruff format . --check

      # 6. データベース初期化用のクライアントをインストール
      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      # 7. DockerイメージをCI用にビルド
      - name: Build image for CI
        run: docker build -t develop_platform_template_image:ci -f .devcontainer/Dockerfile-dev .

      # 8. 初期化SQLの実行
      - name: Initialize database
        run: |
          set -e
          for file in $(ls test/integration/mysql/init/*.sql | sort); do
            echo "Running $file"
            mysql -h 127.0.0.1 \
              -u test_user \
              -ptest_password test_db < $file
          done

      # 9. unitテストの実行(コンテナ内)
      - name: Run Unit Tests
        run: |
          docker run --rm \
            develop_platform_template_image:ci \
            python -m pytest test/unit -v

      # 10. integrationテストの実行(コンテナ内)
      - name: Run Integration Tests
        run: |
          docker run --rm \
            --network host \
            -e DB_HOST=127.0.0.1 \
            develop_platform_template_image:ci \
            python -m pytest test/integration -v