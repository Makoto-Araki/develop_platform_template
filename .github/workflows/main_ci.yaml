# -----------------------------------------------------------------------
# Workflow名: Main CI
# 目的:
# - main ブランチの健全性を保証
# - PRマージ後の最終チェック
# - まだリリースはしない
# -----------------------------------------------------------------------
name: Main CI

on:
  # main ブランチへの push（= PR merge）時のみ実行
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      # 1. ソースコード取得
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Dockerイメージをビルド(Dockerfile-devを使用)
      - name: Build image
        run: docker build -t develop_platform_template_image:main -f .devcontainer/Dockerfile-dev .

      # 3. 脆弱性スキャン(セキュリティゲート)
      - name: Run vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'develop_platform_template_image:main'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # 4. unitテストの実行(コンテナ内)
      - name: Run Unit Tests
        run: |
          docker run --rm \
            develop_platform_template_image:main \
            python -m pytest test/unit -v

      # 5. integrationテストの実行(コンテナ内)
      - name: Run Integration Tests
        run: |
          docker run --rm \
            develop_platform_template_image:main \
            python -m pytest test/integration -v